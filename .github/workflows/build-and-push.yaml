name: Build and Push Plateau Gradio
on:
  push:
    branches: ["main"]
    paths: ["Dockerfile", ".dockerignore", "main.py", "weights.pt"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pranavgnn/plateau-gradio:latest
            ghcr.io/pranavgnn/plateau-gradio:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          outputs: type=image,name=target,compression=zstd,push=true
